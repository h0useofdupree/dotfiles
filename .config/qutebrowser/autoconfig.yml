config_version: 2
settings:
  content.notifications.enabled:
    https://web.whatsapp.com: true
    https://www.netflix.com: false
  url.default_page:
    global: localhost:5005
  url.searchengines:
    global:
      DEFAULT: https://duckduckgo.com/?q={}
      am: https://amazon.de/s?k={}
  url.start_pages:
    global: localhost:5005
